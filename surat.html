<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>for u el</title>
    <style>
        .message-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 30px;
            position: relative;
            z-index: 2;
        }
        #typing-text {
            font-size: 1.5rem;
            line-height: 1.8;
            margin-bottom: 40px;
            color: #ffc0cb;
            text-shadow: 0 0 10px #ff69b4;
            min-height: 150px; 
            max-width: 600px;
            width: 90%;
            text-align: justify;
            text-justify: inter-word;
            hyphens: none !important;
            word-break: keep-all;
            white-space: pre-wrap;
        }
        .button {
            opacity: 0;
            transition: opacity 1.5s ease-in;
            pointer-events: none;
        }
        .button.visible {
            opacity: 1;
            pointer-events: auto;
        }
        #typing-text::after {
            content: "|";
            animation: blink 0.7s infinite;
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        .petals-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }
        .petal {
            position: absolute;
            background: #ffc0cb;
            border-radius: 150% 0 150% 0;
            opacity: 0.7;
            animation: fall linear infinite;
        }
        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.8; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }
        @media screen and (max-width: 600px) {
            #typing-text { font-size: 1.2rem; }
        }
    </style>
</head>
<body>
    <div class="petals-container" id="petal-container"></div>
    <div class="message-box">
        <p id="typing-text"></p>
        <div class="button" id="btn-flower">
            <button>
                <a href="flower.html">klikk disiniii</a>
            </button>
        </div>
    </div>
    <script>
        const text = "Happy birthday ya el walaupun telat beberapa hari sih Hahaha. Tapi tenang soalnya tadi aku sengaja cegat Pak Jokowi pas ketemu di Malioboro cuma buat ceritain betapa lucukknya kamu Beliau sampai manggut-manggut dan nitip salam katanya semoga el panjang umur, sehat terus, rezekinya ngalir terus kayak antrean mie gacoan, dan semua keinginannya segera terwujud.";
        const typingSpeed = 120; 
        let i = 0;
        function typeWriter() {
            if (i < text.length) {
                document.getElementById("typing-text").innerHTML += text.charAt(i);
                i++;
                setTimeout(typeWriter, typingSpeed);
            } else {
                setTimeout(() => { document.getElementById("btn-flower").classList.add("visible"); }, 500);
            }
        }
        function createPetals() {
            const container = document.getElementById('petal-container');
            for (let i = 0; i < 30; i++) {
                const petal = document.createElement('div');
                petal.className = 'petal';
                const size = Math.random() * 15 + 10 + 'px';
                petal.style.width = size;
                petal.style.height = size;
                petal.style.left = Math.random() * 100 + 'vw';
                petal.style.animationDuration = Math.random() * 5 + 5 + 's';
                petal.style.animationDelay = Math.random() * 5 + 's';
                container.appendChild(petal);
            }
        }
        window.onload = () => { typeWriter(); createPetals(); };
    </script>
</body>
</html>
